name: 批量检测网站是否使用Cloudflare (断点续传与防冲突版)

# 触发条件配置
on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *'

permissions:
  contents: write

jobs:
  run-detection:
    runs-on: ubuntu-latest
    # 【新增硬性约束】：设定工作流最大运行时间为 20 分钟
    timeout-minutes: 20

    steps:
    - name: 检出仓库代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 检查并生成依赖文件
      run: |
        if [ ! -f requirements.txt ]; then
          echo "未检测到 requirements.txt，正在自动生成..."
          echo "requests==2.31.0" > requirements.txt
        else
          echo "requirements.txt 已存在。"
        fi

    - name: 设置 Python 环境并启用缓存
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: 安装项目依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 运行检测脚本
      run: |
        python check_cf.py

    - name: 提交并推送结果到仓库 (防冲突处理)
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        
        CURRENT_BRANCH=$(git branch --show-current)
        if [ -n "$CURRENT_BRANCH" ]; then
          git pull --rebase origin "$CURRENT_BRANCH" || echo "同步远端代码失败，将尝试继续执行"
        fi
        
        if [ -f result.csv ]; then git add result.csv; fi
        if [ -f progress.txt ]; then git add progress.txt; fi
        if [ -f domains.txt ]; then git add domains.txt; fi
        if [ -f requirements.txt ]; then git add requirements.txt; fi
        
        if ! git diff --cached --quiet; then
          git commit -m "自动更新: 追加检测结果, 更新进度与域名名单 [工作流自动提交]"
          git push
          echo "结果、进度和域名名单已成功更新并推送到仓库。"
        else
          echo "检测结果和进度没有发生变化，无需提交。"
        fi
